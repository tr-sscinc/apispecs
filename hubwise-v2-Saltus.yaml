  /accounts:
    get:
      tags:
        - Account
      summary: Query accounts
      description: |
        This endpoint retrieves the full details of an account that the requester is authorised to access
        
        
          - Filters:
        
            - `name` - Partial match on the account name (minimum 2 characters).
        
            - `accountId`- Partial match on the account ID (minimum 2 characters).
        
            - `investorId`- Exact match only.
        
            - `status`- Exact match on account status (e.g. NEW, PENDING). Refer to the Model section for the full list of supported values.
        
            - `sortColumn`- Allows sorting by any field (e.g. createdOnDate, name). See the Model section for the full list of sortable fields.
        
          - Pagination controls:
        
            - `Pagination` - Limit and offset controls for navigating large result sets.
        
            - `Sorting` - Sort results by any supported field.
      operationId: searchAccounts
      parameters:
        - name: name
          in: query
          description: "Filter accounts by name, this is a predictive search"
          required: false
          schema:
            maxLength: 50
            minLength: 2
            type: string
            description: "Filter accounts by name, this is a predictive search"
          example: HUB
        - name: accountId
          in: query
          description: >-
            Search using unique identifier of the account, this is a predictive
            search
          required: false
          schema:
            maxLength: 11
            minLength: 2
            type: string
            description: >-
              Search using unique identifier of the account, this is a
              predictive search
          example: HW00013451A
        - name: investorId
          in: query
          description: Investor ID linked to the account
          required: false
          schema:
            maxLength: 11
            minLength: 11
            type: string
            description: Investor ID linked to the account
          example: INV12345678
        - name: status
          in: query
          description: Status of the Account
          required: false
          schema:
            type: string
            description: Status of the Account
            enum:
              - NEW
              - DELETED
              - SUSPENDED
              - INCEPTED
              - PENDING
        - name: sortColumn
          in: query
          description: Column on which to sort data
          required: false
          schema:
            type: string
            description: Column on which to sort data
            enum:
              - createdOnDate
              - name
              - accountId
              - status
              - productId
        - name: sortDirection
          in: query
          description: >-
            Sort direction for results. Use 'ASC' for ascending or 'DESC' for
            descending.
          required: false
          schema:
            type: string
            description: >-
              Sort direction for results. Use 'ASC' for ascending or 'DESC' for
              descending.
            default: DESC
            enum:
              - ASC
              - DESC
          example: DESC
        - name: pageIndex
          in: query
          description: Zero-based index of the page to retrieve (0 = first page).
          required: false
          schema:
            minimum: 0
            type: string
            description: Zero-based index of the page to retrieve (0 = first page).
            default: "0"
        - name: pageSize
          in: query
          description: Number of records per page. Maximum allowed is 100
          required: false
          schema:
            maximum: 50
            minimum: 1
            type: string
            description: Number of records per page. Maximum allowed is 100
            default: "10"
      responses:
        "200":
          description: Accounts retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsQueryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                QueryParam:
                  $ref: "#/components/examples/400-BadRequest-Query"
        "401":
          $ref: "#/components/responses/401-Unorthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "500":
          $ref: "#/components/responses/500-ServerError"

    post:
      tags:
        - Account
      operationId: createAccount
      summary: Create a pending Account
      description: "Allows the creation of a single investment account. It supports the creation of Individual, Corporate, Trust and Joint accounts. The required data varies depending on the product type and includes the accounts core profile information, linking of related investor(s), a product and an investment model .\r\n\r\nThis endpoint  should be used when creating new account records. The related investors must be created prior to the account being created. The details of the product and model to be assigned to the account must be included in the request message. Once an account has been created the product, type and currencies against the account cannot be updated.  The number and type of related investors against an account can vary per product type. If declaration templates are required from the declaration API they must be included in the request message.The account id returned in the response payload will be required for account maintenance. The endpoint must be called for each account record.\r\n\r\nThe account will be created in a pending status. To activate the account the account activation must be called once any other endpoints that are required for the account are called (Bank Accounts, Money Movement, Transfers, Fees, Relationships).\r\n\r\nThe account name is used for the recipients name in documentation and for display purposes in the adviser portal. It should be set to the organisation name, related investors name or a concatenation of all of the related investors names. We recommend the account name is set to:\r\n\r\n1. organisation name for a corporate or trust\r\n\r\n2. title + firstName + middleName + surname for an individual owner and concatenation with an ampersand for joint accounts . If this exceeds 50 characters drop middleName and title or any other appropriate fields if required."
      parameters:
        - name: testMode
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Account"
            examples:
              Ex1:
                summary: SIPP account
                value:
                  {
                    "productId": "HIS",
                    "type": "ADVISED",
                    "adviserId": "E273053",
                    "baseCurrency": "GBP",
                    "marketSettlementCurrency": "GBP",
                    "name": "Mr Hubwise Person",
                    "external":
                      [
                        {
                          "reference": "d8d3a6b1-f1e5-4b0a-8d2c-0a3f5b7e9d1c",
                          "provider": "CRM Name",
                        },
                      ],
                    "investors":
                      [
                        {
                          "investorId": "HWI00007126",
                          "relationship": "OWNER",
                        },
                      ],
                    "pensionDetails":
                      {
                        "employmentStatus": "OTHER",
                        "employmentStatusOther": "Contractor",
                        "taxReliefEntitlement": "UK_RESIDENT",
                        "retirementAge": 75,
                        "mpaaTriggeredDate": "2025-04-28",
                      },
                    "model":
                      {
                        "id": "HW000000090",
                        "tenantId": "HUBWISE",
                        "date": "2020-04-28",
                        "customerId": "CUST023",
                      },
                    "declarations":
                      {
                        "templateId": "ACCOUNT_ISA",
                        "adviserId": "E273053",
                        "acknowledgement": true,
                        "acknowledgementReason": "string",
                      },
                  }
        required: true
      responses:
        "201":
          description: Account created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Bad request
          content:
