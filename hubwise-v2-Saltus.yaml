  /declarations:
    get:
      tags:
        - Declarations
      summary: Get Declaration Templates by Event
      description: >
        - Retrieve declaration templates for a given eventKey.

        - Requires channel (`D2C` or `ADVISED`).

        - Either (`eventKey + accountId`) OR (`eventKey + investorId`) must be
        provided.
      operationId: getDeclarationTemplates
      parameters:
        - name: eventKey
          in: query
          description: Event Key
          required: true
          schema:
            type: string
          example: ACCOUNT_ACTIVATION
        - name: channel
          in: query
          description: Channel
          required: true
          schema:
            type: string
          example: D2C
        - name: accountId
          in: query
          description: Unique identifier of the account.
          required: false
          schema:
            type: string
            description: Unique identifier of the account.
            example: S3000000118
          example: S3000000118
        - name: investorId
          in: query
          description: Unique identifier of the investor.
          required: false
          schema:
            type: string
            description: Unique identifier of the investor.
            example: S3I00008426
          example: S3I00008426
        - name: customerId
          in: query
          required: false
          schema:
            type: string
        - name: platformId
          in: query
          required: false
          schema:
            type: string
        - name: productId
          in: query
          required: false
          schema:
            type: string
        - name: sortColumn
          in: query
          required: false
          schema:
            type: string
        - name: sortDirection
          in: query
          description: >-
            Sort direction for results. Use 'ASC' for ascending or 'DESC' for
            descending.
          required: false
          schema:
            type: string
            description: >-
              Sort direction for results. Use 'ASC' for ascending or 'DESC' for
              descending.
            example: DESC
            default: DESC
            enum:
              - ASC
              - DESC
          example: DESC
        - name: pageIndex
          in: query
          description: Zero-based index of the page to retrieve (0 = first page).
          required: false
          schema:
            minimum: 0
            type: string
            description: Zero-based index of the page to retrieve (0 = first page).
            default: '0'
        - name: pageSize
          in: query
          description: Number of records per page. Maximum allowed is 100
          required: false
          schema:
            maximum: 50
            minimum: 1
            type: string
            description: Number of records per page. Maximum allowed is 100
            default: '10'
      responses:
        '200':
          description: Declaration templates successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeclarationTemplateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                RequestBody:
                  $ref: '#/components/examples/400-BadRequest-Requestbody'
        '401':
          $ref: '#/components/responses/401-Unorthorized'
        '403':
          $ref: '#/components/responses/403-Forbidden'
        '500':
          $ref: '#/components/responses/500-ServerError'

components:
  
  schemas:
    
    Error:
      type: object
      description: A standard error response.
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          description: Application-specific error code that uniquely identifies the error.
        message:
          type: string
          description: Human-readable error message providing more context about the error.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RequestValidationIssue'

    RequestValidationIssue:
      type: object
      description: |
          A collection of validation issues with the request.
      required:
        - message
      properties:
        field:
          x-ssc-obsolete: true
          type: string
        resource:
          x-ssc-obsolete: true
          type: string
        jsonPath:
          type: string
          description: |-
            If a request body is passed, the JSON Path expression pointing to the value in the request body which caused the validation failure.


            The RFC standard for JSON Path: https://www.rfc-editor.org/rfc/rfc9535.html 
        message:
          type: string
          description: Detailed error message about the request validation failure.
      

    AccountModel:
      required:
        - currency
        - entityType
        - productId
        - relatedInvestors
        - type
      type: object
      properties:
        accountId:
          maxLength: 11
          type: string
          description: Id
          format: string
          readOnly: true
          example: HW00013451A
        customerId:
          maxLength: 7
          type: string
          description: Customer Id
          format: string
          readOnly: true
          example: HUBWISE
        productId:
          maxLength: 3
          minLength: 0
          type: string
          description: Product Id
          format: string
          example: GIA
        entityType:
          type: string
          description: Entity Type
          example: INDIVIDUAL
          enum:
            - INDIVIDUAL
            - CORPORATE
            - JOINT
            - TRUST
            - CLUB
        type:
          type: string
          description: Type
          example: ADVISED
          enum:
            - ADVISED
            - DISCRETIONARY
            - EXECUTIONONLY
        currency:
          maxLength: 3
          minLength: 0
          type: string
          description: Currency
          format: string
          example: GBP
        marketSettlementCurrency:
          maxLength: 3
          minLength: 0
          type: string
          description: Market Settlement Currency
          format: string
          example: GBP
        category:
          type: string
          description: Category
          example: INDIVIDUAL
          enum:
            - INDIVIDUAL
            - PRIMARY
            - SECONDARY
        name:
          maxLength: 50
          minLength: 0
          type: string
          description: Name
          format: string
          example: Mr Hub Wise Person
        model:
          $ref: '#/components/schemas/ModelHeader'
        feeAccountId:
          maxLength: 11
          minLength: 0
          type: string
          description: Fee Account Id
          format: string
          example: HW00000124A
        externalReference:
          maxLength: 20
          minLength: 0
          type: string
          description: External Reference
          format: string
          example: EL1027305
        adviserId:
          maxLength: 7
          minLength: 0
          type: string
          description: adviserId
          format: string
          example: E273053
        inceptionDate:
          type: string
          description: Inception Date
          format: date
          readOnly: true
          example: '2025-04-28'
        status:
          type: string
          description: status
          readOnly: true
          example: NEW
          enum:
            - NEW
            - DELETED
            - INCEPTED
            - MIGRATING
            - SUSPENDED
            - FROZEN
            - SUBMITTED_FOR_AUTHORIZATION
            - DECEASED
            - TRANSFERRING_OUT
            - TRANSFERRING_IN
            - TRADING_SUSPENDED
            - MOVEMENTS_REJECTED
            - PENSION_SHARING_ORDER
            - PROBATE
            - OVERSEAS
            - AWAITING_FINAL_CTC
            - PENDING
            - PRE_AML
            - REFERRED
            - FAILED
