    Fee:
      required:
        - frequency
        - type
      type: object
      properties:
        feeCode:
          maxLength: 6
          minLength: 0
          type: string
          description: Predefined fee code (used for tiered/tariff-based fees).
          example: AFGVCD
        feeValue:
          minimum: 0
          exclusiveMinimum: false
          type: number
          description: Fixed fee amount (in currency). Should be up to 11 digits.
          example: 100
        feePercent:
          maximum: 100
          exclusiveMaximum: false
          minimum: 0
          exclusiveMinimum: false
          type: number
          description: "Fee as a percentage (e.g., 0.75 = 0.75%)."
          example: 0.75
        type:
          type: string
          description: Specifies the type of fee being charged.
          example: ADVISER-ANNUAL
          enum:
            - ADVISER-ANNUAL
            - ADVISER-INITIAL
            - ADVISER-ONE-OFF
            - PORTFOLIO-MANAGEMENT-FEES
            - INVESTMENT-MANAGEMENT-FEES
            - PRODUCT-ANNUAL
            - PLATFORM-ANNUAL
            - PRODUCT-INI-FEES
            - PLATFORM-INI-FEES
            - DISCRETIONARY-FUND-MANAGEMENT-FEES
        frequency:
          type: string
          description: Indicates how frequently the fee is charged.
          example: MONTHLY
          enum:
            - ANNUAL
            - MONTHLY
            - QUARTERLY
            - HALF-YEARLY
            - ONE-OFF
        startDate:
          type: string
          description: "Date the fee starts (format: yyyy-MM-dd)."
          format: date
          example: "2025-04-28"
        endDate:
          type: string
          description: "Date the fee ends (format: yyyy-MM-dd)."
          format: date
          example: "2025-05-28"
        vatIncluded:
          type: boolean
          description: Whether VAT is included in the fee amount.
          example: true
        transactionId:
          maximum: 99999
          type: integer
          description: "Transaction ID associated with the fee, if applicable."
          format: int64
          readOnly: true
          example: 12345
        id:
          maximum: 99999
          minimum: 0
          type: integer
          description: Unique identifier for the fee record.
          format: int64
          readOnly: true
          example: 12345
        accountId:
          maxLength: 11
          minLength: 0
          type: string
          description: Identifier of the associated account.
          readOnly: true
          example: HW000000108
        adviserId:
          maxLength: 7
          minLength: 0
          type: string
          description: Adviser’s unique identifier.
          readOnly: true
          example: E000139
        customerId:
          maxLength: 7
          minLength: 0
          type: string
          description: Customer identifier related to the fee.
          readOnly: true
          example: HUBWISE
        tierDetails:
