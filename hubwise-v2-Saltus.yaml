  /investors/{investorId}:
    get:
      tags:
        - Investor
      summary: Retrieve an investor by providing the unique investor identifier
      description: |
                Retrieves the full details of a specific investor, an individual entity, using their unique SS&C Hubwise Investor ID generated when an investor is created.
                This endpoint should be used when displaying detailed investor information. The response includes the investor’s core profile information, contact details, address records, territorial profile, and type-specific attributes for Individual, Corporate and Trust  investors.
                Only investors that the requester is authorised to access will be returned.
                If the investor does not exist or the requester lacks permission, an appropriate error response is returned.  The endpoint must be called for each investor record. Addresses that have been soft deleted for an investor will not be returned.
      operationId: getInvestorById
      parameters:
        - name: investorId
          in: path
          description: Investor Id
          required: true
          schema:
            type: string
          example: HWI04003219
