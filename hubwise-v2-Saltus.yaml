      summary: Create an Investor
      description: >
        Allows the creation of a specific investor, an individual entity. It supports the creation of Individual, Corporate and  Trust investors. The required data varies depending on the investor type and includes the investor's core profile information, contact details, 1 or more addresses and 1 or more territorial profiles.


        This endpoint should be used when creating new investor records. The Get Declaration Templates API can be used to identify required declarations that must be included in the request message. An investor can have a maximum of 10 addresses, 5 nationalities and tax residencies. The investor record id returned in the response payload will be required for investor and account maintenance. The endpoint must be called for each investor record.
      operationId: createInvestor
