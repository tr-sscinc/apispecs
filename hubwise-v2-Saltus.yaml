openapi: 3.0.1

info:
  title: SS&C API
  description: API Contract to integrate with SS&C Hubwise
  version: 2.0.0-Saltus
  contact:
    email: apidevs@sscinc.com
    name: SS&C Hubwise API Support  
    url: https://docs.portal.hubwise.co.uk/
  license:
    name: SS&C API Restricted License
    url: https://docs.portal.hubwise.co.uk/api-restricted-license.pdf

servers:
  - url: 'https://rest-sb.hubwise.co.uk/api/v2'
    description: Sandbox environment
  - url: 'https://rest-qd.hubwise.co.uk/api/v2'
    description: Pilot/UAT environment
  - url: 'https://rest.hubwise.co.uk/api/v2'
    description: Live environment

tags:
  - name: Account
    description: >-
      Enables the creation, retrieval, modification, and removal of investment accounts within the SS&C Hubwise platform.


      GIA, SIPP and other account types are supported. 
  - name: Investor
    description: >
      Enables the creation, retrieval, modification, and removal of investor records within the SS&C Hubwise platform. 
      
      
      Individual, Corporate and Trust investor types are supported.
  - name: Declarations
    description: > 
    
      Allows access to regulatory and compliance declarations.

security:
  - bearer-token: []
  - x-api-key: []

paths:
  
  /investors:
    post:
      tags:
        - Investor
      summary: Create an Investor
      description: >
        Allows the creation of a specific investor, an individual entity. It
        supports the creation of Individual, Corporate and  Trust investors. The
        required data varies depending on the investor type and includes the
        investor's core profile information, contact details, 1 or more
        addresses and 1 or more territorial profiles.

        This endpoint should be used when creating new investor records. The Get
        Declaration Templates API can be used to identify required declarations
        that must be included in the request message. An investor can have a
        maximum of 10 addresses, 5 nationalities and tax residencies. The
        investor record id returned in the response payload will be required for
        investor and account maintenance. The endpoint must be called for each
        investor
        record.                                                                                                                                                                                                                                                                                                                                                                                                                                    
        This endpoint should be used when creating new investor records. The Get
        Declaration Templates API can be used to identify required declarations
        that must be included in the request message. An investor can have a
        maximum of 5 active addresses. The investor record id returned in the
        response payload will be required for investor and account maintenance.
        The endpoint must be called for each investor record.
