          type: string
          description: Indicates who the payer is; typically SELF or EMPLOYER.
          example: SELF
          enum:
            - SELF
            - EMPLOYER
        frequency:
          type: string
          description: "Frequency of the movement, e.g., ONE-OFF, MONTHLY."
          example: ONE-OFF
          enum:
            - ANNUAL
            - MONTHLY
            - QUARTERLY
            - HALF-YEARLY
            - ONE-OFF
        value:
          $ref: "#/components/schemas/Value"
        bank:
          $ref: "#/components/schemas/BankAccountDetails"
        isGross:
          type: boolean
          description: Flag indicating whether the value is gross or net.
          example: true
        startDate:
          type: string
          description: Start date for this movement.
          format: date
        reference:
          pattern: '^[A-Z0-9]{2}-[A-Z0-9]+-\d+$'
          type: string
          description: Reference associated with this movement.
        fee:
          $ref: "#/components/schemas/MovementFee"
        endDate:
          type: string
          description: >-
            End date for the movement. Applicable in draw-downs or recurring
            setups
          format: date
        isMaximum:
          type: boolean
          description: >-
            Indicates if the maximum allowable amount should be considered.
            Applicable for draw-downs only.
        cashOnlyInstruction:
          type: boolean
          description: >-
            Indicates whether money needs to go into CASH or if false/null this
            goes into Model selected at Account Level.
          example: false
        hrmcProtection:
          $ref: "#/components/schemas/HMRCProtection"
        sourceOfFund:
          $ref: "#/components/schemas/SourceOfFund"
        thirdPartyId:
          type: string
          description: >-
            Third-party ID if payment or investment is made by an external
            person/entity.
        dependantAccountId:
          type: string
          description: Id of a dependant account involved in this movement.
        returnUri:
          type: string
          description: >-
            Return Uri where the traffic needs to be routed once the faster
            payment is completed.
        status:
          type: string
          description: Status of the movement such CREATED
          readOnly: true
          example: NEW
          enum:
            - INCEPTED
            - NEW
            - COMPLETE
            - PENDING
            - ARCHIVED
        creditDebit:
          type: string
          description: If the movement is credit or debit
          readOnly: true
          example: CREDIT
          enum:
            - CREDIT
            - DEBIT
