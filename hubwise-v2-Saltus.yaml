  /investors/{investorId}/vulnerabilities:
    post:
      tags:
        - Investor
      summary: Create investor vulnerabilities
      description: >
        Allows the creation of 1 or more characteristics of vulnerabilities for a specific investor using their unique SS&C Hubwise Investor ID which is generated when an investor is created. This is only applicable to an investor type of Individual or Court Appointed Deputy.  The endpoint must be called for each investor record.


        The characteristics of vulnerabilities endpoint should be used when creating new characteristics of vulnerabilities records against an existing investor record.  Vulnerabilities and the associated service level must be provided for each record. If a start date is not provided it will be defaulted to the current date. 


        The Get Declaration Templates API can be used to identify any required declarations that must be included in the request message.


        If the investor does not exist or the requester lacks permission, an appropriate error response will be returned. Only investors that the requester is authorised to access can be used. If characteristics of vulnerabilities already exists against the investor, the update endpoint needs to be used and an appropriate error response will be returned.
      operationId: createVulnerabilities
      parameters:
        - name: testMode
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: investorId
          in: path
          description: Investor Id
          required: true
          schema:
            type: string
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VulnerabilityHeader"
            examples:
              Ex1:
                summary: Characteristics of a vulnerable investor
                value:
                  {
                    "vulnerabilities":
                      [
                        {
                          "type": "HEALTH",
                          "serviceLevel": "SPEAK_LOUDLY_AND_CLEARLY",
                          "startDate": "2025-10-01",
                          "expiryDate": "2025-10-22",
                        },
                        {
                          "type": "HEALTH",
                          "serviceLevel": "SPEAK_SLOWLY_FOR_CLIENT",
                        },
                      ],
                    "declarations":
                      [
                        {
                          "adviserId": "E273053",
                          "templateId": "VULNERABLE",
                          "acknowledgement": true,
                        },
                      ],
                  }
        required: true
      responses:
        "201":
          description: Investor vulnerabilities created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VulnerabilityHeader"
              examples:
                Ex1:
                  summary: Characteristics of a vulnerable investor
                  value:
                    {
                      "investor": { "id": "HWI00016530" },
                      "tenantId": "HUBWISE",
                      "vulnerabilities":
                        [
                          {
                            "type": "HEALTH",
                            "serviceLevel": "SPEAK_LOUDLY_AND_CLEARLY",
                            "startDate": "2025-10-01",
                            "expiryDate": "2025-10-22",
                            "adviserId": "E273053",
                          },
                          {
                            "type": "HEALTH",
                            "serviceLevel": "SPEAK_SLOWLY_FOR_CLIENT",
                            "startDate": "2025-10-22",
                            "adviserId": "E273053",
                          },
                        ],
                      "declarations":
                        [
                          {
                            "adviserId": "E273053",
                            "templateId": "CONFIRM_VULNERABILITY_CONSENT",
                            "acknowledgement": true,
                          },
                        ],
                    }
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                PathParam:
                  $ref: "#/components/examples/400-BadRequest-Path"
                QueryParam:
                  $ref: "#/components/examples/400-BadRequest-Query"
                RequestBody:
                  $ref: "#/components/examples/400-BadRequest-Requestbody"
        "401":
          $ref: "#/components/responses/401-Unorthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "404":
          $ref: "#/components/responses/404-NotFound"
        "500":
          $ref: "#/components/responses/500-ServerError"

  /investors/{investorId}/correspondences:
    post:
      tags:
        - Investor
      summary: Create investor correspondences
      description: >
        Allows the creation of 1 or more correspondences  for a specific investor using their unique SS&C Hubwise Investor ID which is generated when an investor is created. This is only applicable to an investor type of Individual or Court Appointed Deputy.  The endpoint must be called for each investor record.

        The correspondences endpoint should be used when creating new correspondence records against an existing investor record.  Correspondences must be provided for each record. If a start date is not provided it will be defaulted to the current date.

        The Get Declaration Templates API can be used to identify any required declarations that must be included in the request message.

        If the investor does not exist or the requester lacks permission, an appropriate error response will be returned. Only investors that the requester is authorised to access can be used. If correspondences already exists against the investor, the update endpoint needs to be used and an appropriate error response will be returned.
      operationId: createCorrespondences
      parameters:
        - name: testMode
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: investorId
          in: path
          description: Investor Id
          required: true
          schema:
            type: string
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrespondenceHeader"
            examples:
              Ex1:
                summary: Investor correspondences
                value:
                  {
                    "correspondences":
                      [
                        {
                          "type": "AUDIO",
                          "startDate": "2025-10-01",
                          "expiryDate": "2025-10-22",
                        },
                        { "type": "BRAILLE", "startDate": "2025-10-01" },
                      ],
                    "declarations":
                      [
                        {
                          "adviserId": "E273053",
                          "id": "00000084480",
                          "templateId": "CORRESPONDENCE",
                          "acknowledgement": true,
                        },
                      ],
                  }
        required: true
      responses:
        "201":
          description: Investor correspondences created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VulnerabilityHeader"
              examples:
                Ex1:
                  summary: Investor correspondences
                  value:
                    {
                      "investor": { "id": "HWI00016530" },
                      "tenantId": "HUBWISE",
                      "correspondences":
                        [
                          {
                            "type": "AUDIO",
                            "startDate": "2025-10-01",
                            "expiryDate": "2025-10-22",
                            "adviserId": "E273053",
                          },
                          {
                            "type": "BRAILLE",
                            "startDate": "2025-10-01",
                            "adviserId": "E273053",
                          },
                        ],
                      "declarations":
                        [
                          {
                            "adviserId": "E273053",
                            "id": "00000084480",
                            "templateId": "CONFIRM_CORRESPONDENCES_CONSENT",
                            "acknowledgement": true,
                          },
                        ],
                    }
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                PathParam:
                  $ref: "#/components/examples/400-BadRequest-Path"
                QueryParam:
                  $ref: "#/components/examples/400-BadRequest-Query"
                RequestBody:
                  $ref: "#/components/examples/400-BadRequest-Requestbody"
        "401":
          $ref: "#/components/responses/401-Unorthorized"
        "403":
