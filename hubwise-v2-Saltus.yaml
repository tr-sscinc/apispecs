  /investors/{investorId}/vulnerabilities:
    post:
      tags:
        - Investor
      summary: Create investor vulnerabilities
      description: >
        - Allows the creation of 1 or more characteristics of vulnerabilities
        for a specific investor using their unique SS&C Hubwise Investor ID
        which is

        - generated when an investor is created. This is only applicable to an
        investor type of Individual or Court Appointed Deputy.

        - The characteristics of vulnerabilities endpoint should be used when
        creating new characteristics of vulnerabilities records against an
        existing

        - investor card. Vulnerabilities and the associated service level must
        be provided for each record. If a start date is not provided it will be

        - defaulted to the current date.

        - If declaration templates are required from the declaration API they
        must be included in the request message. The endpoint must be called for

        - each investor record.

        - If the investor does not exist or the requester lacks permission, an
        appropriate error response will be returned. Only investors that the
        requester

        - is authorised to access can be used. If characteristics of
        vulnerabilities already exists aginst the investor, the update endpoint
        needs to be used

        - and an appropriate error response will be returned.
      operationId: createVulnerabilities
      parameters:
        - name: testMode
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: investorId
          in: path
          description: Investor Id
          required: true
          schema:
            type: string
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnerabilityChangeHeaderModel'
        required: true
      responses:
        '201':
          description: Investor vulnerabilities created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityChangeHeaderModel'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                PathParam:
                  $ref: '#/components/examples/400-BadRequest-Path'
                QueryParam:
                  $ref: '#/components/examples/400-BadRequest-Query'
                RequestBody:
                  $ref: '#/components/examples/400-BadRequest-Requestbody'
        '401':
          $ref: '#/components/responses/401-Unorthorized'
        '403':
          $ref: '#/components/responses/403-Forbidden'
        '404':
          $ref: '#/components/responses/404-NotFound'
        '500':
          $ref: '#/components/responses/500-ServerError'

  /investors/{investorId}/correspondences:
    post:
      tags:
        - Investor
      summary: Create investor correspondences
      description: >
        - Allows the creation of 1 or more correspondences for a specific
        investor using their unique SS&C Hubwise Investor ID which is generated
        when

        - an investor is created. This is only applicable to an investor type of
        Individual or Court Appointed Deputy.

        - The correspondences endpoint should be used when creating new
        correspondence records against an existing investor record.

        - Correspondences must be provided for each record. If a start date is
        not provided it will be defaulted to the current date.

        - If declaration templates are required from the declaration API they
        must be included in the request message. The endpoint must be called for

        - each investor record.

        - If the investor does not exist or the requester lacks permission, an
        appropriate error response will be returned. Only investors that the

        - requester is authorised to access can be used. If correspondences
        already exists against the investor, the update endpoint needs to be
        used

        - and an appropriate error response will be returned.
      operationId: createVulnerabilities_1
      parameters:
        - name: testMode
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: investorId
          in: path
          description: Investor Id
          required: true
          schema:
            type: string
          example: HW00013451A
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrespondenceChangeHeaderModel'
        required: true
      responses:
        '201':
          description: Investor vulnerability correspondences created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityChangeHeaderModel'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                PathParam:
                  $ref: '#/components/examples/400-BadRequest-Path'
                QueryParam:
                  $ref: '#/components/examples/400-BadRequest-Query'
                RequestBody:
                  $ref: '#/components/examples/400-BadRequest-Requestbody'
        '401':
          $ref: '#/components/responses/401-Unorthorized'
        '403':
          $ref: '#/components/responses/403-Forbidden'
        '404':
          $ref: '#/components/responses/404-NotFound'
        '500':
          $ref: '#/components/responses/500-ServerError'

  /accounts:
    get:
      tags:
        - Account
      summary: Query accounts
      description: |
          This endpoint retrieves the full details of an account that the requester is authorised to access
          - Supported Filters:
            - `name` - Partial match on the account name (minimum 2 characters).
            - `accountId`- Partial match on the account ID (minimum 2 characters).
            - `investorId`- Exact match only.
            - `status`- Exact match on account status (e.g. NEW, PENDING). Refer to the Model section for the full list of supported values.
            - `sortColumn`- Allows sorting by any field (e.g. createdOnDate, name). See the Model section for the full list of sortable fields.
          - Additional Features:
            - `Pagination` - Limit and offset controls for navigating large result sets.
            - `Sorting` - Sort results by any supported field.
      operationId: searchAccounts
      parameters:
        - name: name
          in: query
          description: 'Filter accounts by name, this is a predictive search'
          required: false
          schema:
            maxLength: 50
            minLength: 2
            type: string
            description: 'Filter accounts by name, this is a predictive search'
            example: HUB
          example: HUB
        - name: accountId
          in: query
          description: >-
            Search using unique identifier of the account, this is a predictive
            search
          required: false
          schema:
            maxLength: 11
            minLength: 2
            type: string
            description: >-
              Search using unique identifier of the account, this is a
              predictive search
            example: HW00013451A
          example: HW00013451A
        - name: investorId
          in: query
          description: Investor ID linked to the account
          required: false
          schema:
            maxLength: 11
            minLength: 11
            type: string
            description: Investor ID linked to the account
            example: INV12345678
          example: INV12345678
        - name: status
          in: query
          description: Status of the Account
          required: false
          schema:
            pattern: NEW|DELETED|SUSPENDED|INCEPTED|PENDING
            type: string
            description: Status of the Account
            example: NEW
            enum:
              - NEW
              - DELETED
              - SUSPENDED
              - INCEPTED
              - PENDING
          example: NEW
        - name: sortColumn
          in: query
          description: Column on which to sort data
          required: false
          schema:
            pattern: createdOnDate|name|accountId|status|productId
            type: string
            description: Column on which to sort data
            example: createdOnDate
            enum:
              - createdOnDate
              - name
              - accountId
              - status
              - productId
          example: createdOnDate
        - name: sortDirection
          in: query
          description: >-
            Sort direction for results. Use 'ASC' for ascending or 'DESC' for
            descending.
          required: false
          schema:
            type: string
            description: >-
              Sort direction for results. Use 'ASC' for ascending or 'DESC' for
              descending.
            example: DESC
            default: DESC
            enum:
              - ASC
              - DESC
          example: DESC
        - name: pageIndex
          in: query
          description: Zero-based index of the page to retrieve (0 = first page).
          required: false
          schema:
            minimum: 0
            type: string
            description: Zero-based index of the page to retrieve (0 = first page).
            default: '0'
        - name: pageSize
          in: query
          description: Number of records per page. Maximum allowed is 100
          required: false
          schema:
            maximum: 50
            minimum: 1
            type: string
            description: Number of records per page. Maximum allowed is 100
            default: '10'
      responses:
        '200':
          description: Accounts retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAccountModel'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                QueryParam:
                  $ref: '#/components/examples/400-BadRequest-Query'
        '401':
          $ref: '#/components/responses/401-Unorthorized'
        '403':
          $ref: '#/components/responses/403-Forbidden'
        '500':
          $ref: '#/components/responses/500-ServerError'


    post:
      tags:
        - Account
      summary: Create account
      description: |
          - This endpoint allows the creation of a new account against investor(s) that the requester has access to.
          - If `testMode=true`, simulates account creation but rolls back changes after validation.
      operationId: createAccount
      parameters:
