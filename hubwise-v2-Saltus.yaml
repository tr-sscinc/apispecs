      summary: Create transfer.
      description: >-
        This endpoint allows you to initiate the transfer of cash and assets
        from another provider onto the platform. It supports both full and
        partial cash transfers, as well as full in-specie transfers.Start by
        retrieving a list of available counterparties and displaying them in a
        dropdown menu within your application. The user can then select the
        counterparty they wish to transfer from, and the associated code will be
        included in the request. If the transfer involves a counterparty not
        listed, the user can manually enter the counterparty’s name and address.
      operationId: createTransfer
      parameters:
        - name: accountId
          in: path
          description: Account Id
          required: true
          schema:
            type: string
          example: HW00013451A
        - name: testMode
          in: query
