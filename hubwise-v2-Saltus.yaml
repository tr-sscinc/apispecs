            - INTENTION_TO_CLOSE
            - CLOSED
            - ARCHIVED
            - FEE_SENT
            - FEE_RECEIVED
            - SUB_ACC_TRANSFER
            - TRANSFER_OUT_CASH
            - NON_UK_RESIDENT
