  /declarations:
    get:
      tags:
        - Declarations
      summary: Get Declaration Templates by Event
      description: >
        - Retrieve declaration templates for a given eventKey.

        - Requires channel (`D2C` or `ADVISED`).

        - Either (`eventKey + accountId`) OR (`eventKey + investorId`) must be
        provided.
      operationId: getDeclarationTemplates
      parameters:
        - name: eventKey
          in: query
          description: Event Key
          required: true
          schema:
            type: string
          example: ACCOUNT_ACTIVATION
        - name: channel
          in: query
          description: Channel
          required: true
          schema:
            type: string
          example: D2C
        - name: accountId
          in: query
          description: Unique identifier of the account.
          required: false
          schema:
            type: string
            description: Unique identifier of the account.
            example: S3000000118
          example: S3000000118
        - name: investorId
          in: query
          description: Unique identifier of the investor.
          required: false
          schema:
            type: string
            description: Unique identifier of the investor.
            example: S3I00008426
          example: S3I00008426
        - name: customerId
          in: query
          required: false
          schema:
            type: string
        - name: platformId
          in: query
          required: false
          schema:
            type: string
        - name: productId
          in: query
          required: false
          schema:
            type: string
        - name: sortColumn
          in: query
          required: false
          schema:
            type: string
        - name: sortDirection
          in: query
          description: >-
            Sort direction for results. Use 'ASC' for ascending or 'DESC' for
            descending.
          required: false
          schema:
            type: string
            description: >-
              Sort direction for results. Use 'ASC' for ascending or 'DESC' for
              descending.
            example: DESC
            default: DESC
            enum:
              - ASC
              - DESC
          example: DESC
        - name: pageIndex
          in: query
          description: Zero-based index of the page to retrieve (0 = first page).
          required: false
          schema:
            minimum: 0
            type: string
            description: Zero-based index of the page to retrieve (0 = first page).
            default: "0"
        - name: pageSize
          in: query
          description: Number of records per page. Maximum allowed is 100
          required: false
          schema:
            maximum: 50
            minimum: 1
            type: string
            description: Number of records per page. Maximum allowed is 100
            default: "10"
      responses:
        "200":
          description: Declaration templates successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeclarationTemplateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                RequestBody:
                  $ref: "#/components/examples/400-BadRequest-Requestbody"
        "401":
          $ref: "#/components/responses/401-Unorthorized"
        "403":
          $ref: "#/components/responses/403-Forbidden"
        "500":
          $ref: "#/components/responses/500-ServerError"

components:
  schemas:
    Error:
      type: object
      description: A standard error response.
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          description: Application-specific error code that uniquely identifies the error.
        message:
          type: string
          description: Human-readable error message providing more context about the error.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      description: |
        A collection of validation issues with the request.
      required:
        - message
      properties:
        field:
          x-ssc-obsolete: true
          type: string
        resource:
          x-ssc-obsolete: true
          type: string
        jsonPath:
          type: string
          description: |-
            If a request body is passed, the JSON Path expression pointing to the value in the request body which caused the validation failure.


            The RFC standard for JSON Path: https://www.rfc-editor.org/rfc/rfc9535.html
        message:
          type: string
          description: Detailed error message about the request validation failure.

    Account:
      required:
        - productId
        - type
        - baseCurrency
        - marketSettlementCurrency
        - name
        - investors
        - model
      type: object
      properties:
        id:
          format: string
          description: Unique SS&C Hubwise Account identifier
          maxLength: 11
          minLength: 11
          type: string
          readOnly: true
          example: HW00013451A
        status:
          description: Current state of the account
          enum:
            - ACTIVE
            - REFERRED
            - DELETED
            - AWAITING_AUTHORISATION
            - SUSPENDED
            - PENDING
            - AWAITING_AML_CHECK
            - DECEASED
            - TRADING_SUSPENDED
            - UNDER_PROBATE
            - INTENTION_TO_CLOSE
            - TRANSFER_OUT_STOCK
            - RECENTLY_OPENED
            - FROZEN
            - CLOSED
            - ARCHIVED
            - TRANSFER_OUT_CASH
            - NON_UK_RESIDENT
            - AML
            - CLOSED_SUB_ACCOUNT
          type: string
          readOnly: true
          example: ACTIVE
        activationDate:
          format: date
          description: The date the account was activated
          type: string
          readOnly: true
          example: "2025-04-28"
        tenantId:
          format: string
          description: SS&C Hubwise tenant ID
          maxLength: 7
          minLength: 7
          type: string
          readOnly: true
          example: HUBWISE
        productId:
          format: string
          description: The product associated to the account
          maxLength: 3
          minLength: 3
          type: string
          example: HIS
        type:
          description: Identifies the level of service provided on an account
          enum:
            - ADVISED
            - DISCRETIONARY
            - EXECUTION_ONLY
          type: string
          example: ADVISED
        adviserId:
          format: string
          description: ID of the adviser assigned to the account
          maxLength: 7
          minLength: 7
          type: string
          example: E273053
        baseCurrency:
          format: string
          description: The currency used  to record the accounts holdings historical cost
          maxLength: 3
          minLength: 3
          type: string
          example: GBP
        marketSettlementCurrency:
          format: string
          description: >-
            The currency in which funds are  paid/received by the buyer and seller when the
            transaction is completed (settled).
          maxLength: 3
          minLength: 3
          type: string
          example: GBP
        name:
          format: string
