          description: Transfer reference number
          example: "896546"
        value:
          $ref: "#/components/schemas/Value"
        actualEstimated:
          type: string
          description: Actual or Estimated
          example: ESTIMATED
          enum:
            - NOT SET
            - ACTUAL
            - ESTIMATED
        status:
          type: string
          description: Transfer status code
          readOnly: true
          example: CRT
          enum:
            - CAN
            - CLO
            - CRJ
            - CRT
            - EXP
            - OPN
            - REJ
        creditDebit:
          type: string
          description: Credit or debit indicator
          readOnly: true
          example: CREDIT
          enum:
            - CREDIT
            - DEBIT
        frequency:
          type: string
          description: Transfer frequency
          readOnly: true
          example: ONE-OFF
          enum:
            - ANNUAL
            - MONTHLY
            - QUARTERLY
            - HALF-YEARLY
            - ONE-OFF
        movementDate:
          type: string
          description: Date of movement in YYYY-MM-DD format
          format: date
          readOnly: true
          example: "2025-04-15"
        isPartial:
          type: boolean
          description: >-
            Choose whether a cash transfer is full or partial. Not applicable
            for in-specie transfers
          example: false
        crystallisedValue:
          maxLength: 11
          type: number
          description: |
            Applicable for pension products
          example: 0
        uncrystallisedValue:
          maxLength: 11
          type: number
          description: Uncrystallised value
          readOnly: true
          example: 0
        planType:
          maxLength: 50
          type: string
          description: >-
            The type of account to be transferred. Required for pension
            products.
          enum:
            - SIPP
            - AContractinaccordancewithsection591
            - Astatutoryschemeestablishedundersection611a
            - Anoverseasscheme
            - AVC
            - FreeStandingAVC
            - DeferredAnnuityContract
            - DefinedBenefitsRetirementBenefitsScheme
            - InternalBidtoBidtransfer
            - MoneyPurchaseRetirementBenefitsScheme
            - OccSchemeapprovedunderCh1PartXIVICTA88
            - PersonalPensionScheme
            - QROPS
            - RetirementAnnuityContract
            - Section226or226Apolicy
            - Section32BuyOut
            - SmallSelfAdministeredScheme
            - StakeholderPensionPlan
        currentYearSubscription:
          maxLength: 11
          type: number
          description: Current year subscription value
          example: 0
        fee:
          $ref: "#/components/schemas/MovementFee"
        auditInfo:
          $ref: "#/components/schemas/AuditInfo"

    CorrespondenceHeader:
      type: object
      properties:
        correspondences:
          type: array
          format: Object
          items:
            $ref: "#/components/schemas/VulnerabilityCorrespondence"
        declarations:
          type: array
          format: Object
          items:
            $ref: "#/components/schemas/Declaration"

    VulnerabilityHeader:
      type: object
      properties:
        investorId:
          type: string
        tenantId:
          maxLength: 7
          minLength: 0
          type: string
          description: Tenant Id
          format: string
          readOnly: true
          example: HUBWISE
        vulnerabilities:
          type: array
          format: Object
          items:
            $ref: "#/components/schemas/Vulnerability"
        declarations:
          type: array
          format: Object
          items:
            $ref: "#/components/schemas/Declaration"

    VulnerabilityCorrespondence:
      type: object
      properties:
        type:
          type: string
          description: >-
            The preferred correspondence format or access arrangement required
            by the investor to support effective communication and accessibility
          readOnly: true
          example: LARGE_PRINT
          enum:
            - AUDIO
            - BRAILLE
            - LARGE_PRINT
            - ERROR
        startDate:
          type: string
          description: Vulnerabilities start date
          format: date
          example: "2025-01-01"
        expiryDate:
          type: string
          description: Vulnerabilities expiry date
          format: date
          example: "2026-01-01"
        adviserId:
          type: string
        auditInfo:
          $ref: "#/components/schemas/AuditInfo"

    Vulnerability:
      type: object
      properties:
        type:
          type: string
          description: >-
            The category of vulnerability applicable to the investor, in line
            with Consumer Duty guidance
          example: HEALTH
          enum:
            - HEALTH
            - LIFE_EVENTS
            - RESILIENCE
            - CAPABILITY
        serviceLevel:
          type: string
          description: >-
            The service adjustment or support requirements needed to ensure fair
            and appropriate customer outcomes. These indicators guide how the
            firm should communicate with or support the investor
          example: ARRANGE_WRITTEN_CONFIRMATION_OF_ANY_DISCUSSIONS
          enum:
            - ARRANGE_WRITTEN_CONFIRMATION_OF_ANY_DISCUSSIONS
            - CLIENT_UNABLE_TO_USE_INTERNET
            - EMPATHY_NEEDED_FOR_CUSTOMER
            - ENGLISH_LANGUAGE_SUPPORT_REQUIRED
            - LITERACY_OR_NUMERACY_SUPPORT_NEEDED
            - ONLINE_SUPPORT_NEEDED
            - DO_NOT_OUTBOUND_CALL
            - USE_SIMPLIFIED_LANGUAGE
            - SPEAK_LOUDLY_AND_CLEARLY
            - SPEAK_SLOWLY_FOR_CLIENT
            - NONE_REQUIRED
            - VARIED_CORRESPONDENCE_FORMAT
            - ERROR
        startDate:
          type: string
          description: Vulnerabilities start date
          format: date
          example: "2025-01-01"
        expiryDate:
          type: string
          description: Vulnerabilities expiry date
          format: date
          example: "2026-01-01"
        adviserId:
          type: string
        AuditInfo:
          $ref: "#/components/schemas/AuditInfo"

  examples:
    400-BadRequest-Path:
      summary: Path parameter does not conform to API schema
      value:
        errorCode: HWA2-0010
        message: Invalid path paramter(s)
        errors:
          - message: id must start with 'HW'

    400-BadRequest-Query:
      summary: Query parameter does not conform to API schema
      value:
        errorCode: HWA2-0011
        message: Invalid query parameter(s)
        errors:
          - message: from-date must be before to-date

    400-BadRequest-Requestbody:
      summary: Request body does not conform to API schema
      value:
        errorCode: HWA-EXCEPTION-001
        message: The request body failed validation
        errors:
          - jsonPath: $.store.book[2].author.email
            message: Invalid email address format
          - jsonPath: $.store.book[2].publishDateTime
            message: Dates should be in ISO8601 format

  responses:
    401-Unorthorized:
      description: Unauththenticated request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Invalid API token
              value:
                errorCode: HWA-EXCEPTION-006
                message: Missing, Expired or API token
            Ex2:
              summary: Invalid bearer token
              value:
                errorCode: HWA-EXCEPTION-006
                message: Missing, Expired or invalid token

    403-Forbidden:
      description: Unorthorised request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Requester not allowed access to the resource
              description: Forbidden
              value:
                errorCode: HWA-EXCEPTION-004
                message: You do not have permission to access this resource

    404-NotFound:
      description: The resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Resource not found
              description: NotFound
              value:
                errorCode: HWA-INVESTOR-001
                message: The requested resource could not be found.

    500-ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            Ex1:
              summary: Unexpected technical error.
              value:
                errorCode: HWA-EXCEPTION-003
                message: |-
                  An unexpected technical error occurred. 


                  Do not retry the call before the time specified in the Retry-After HTTP response header. If no Retry-After header is returned, do not retry the call.

  securitySchemes:
    bearer-token:
      type: http
      scheme: bearer
      bearerFormat: JWT

    x-api-key:
      type: apiKey
      name: x-api-key
      in: header
