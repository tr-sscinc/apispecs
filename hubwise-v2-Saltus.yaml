    AccountPensionModel:
      type: object
      properties:
        accountId:
          maxLength: 11
          type: string
          description: Id
          format: string
          readOnly: true
          example: HW00013451A
        customerId:
          maxLength: 7
          type: string
          description: Customer Id
          format: string
          readOnly: true
          example: HUBWISE
        employmentStatus:
          maxLength: 30
