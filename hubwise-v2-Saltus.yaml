          format: int64
          readOnly: true
          example: 2
        type:
          type: string
          description: "Type of the movement such as CONTRIBUTIONS, WITHDRAWALS."
          example: CONTRIBUTIONS
          enum:
            - CONTRIBUTIONS
            - WITHDRAWALS
            - INCOME_DISTRIBUTIONS_WITHDRAWAL
            - INCOME_WITHDRAWAL_REINVEST
            - UFPLS
            - FLEXI_ACCESS_INCOME
            - FLEXI_ACCESS_PCLS
